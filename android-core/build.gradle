apply plugin: 'com.android.library'

android {
    namespace 'com.google.zxing.client.android.core'
    compileSdk 34

    defaultConfig {
        minSdk 23
    }
}

dependencies {
    implementation project(':core')
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
    }
}
